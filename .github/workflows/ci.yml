name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: lint · test · eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # [reports] for the PDF test; [db,queue] for persistence/queue tests (which
      # use SQLite + fakeredis, no live services). The deterministic template path
      # means no LLM/AWS keys are needed for tests or eval.
      - run: pip install -e ".[dev,reports,db,queue]"
      - run: make lint
      - run: make test
      - run: make eval

  web:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  images:
    name: build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t cloudtrim-api .
      - run: docker build -f apps/worker/Dockerfile -t cloudtrim-worker .

  deploy:
    name: deploy (main)
    runs-on: ubuntu-latest
    needs: [backend, web, images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Fly.io (skipped without FLY_API_TOKEN)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "No FLY_API_TOKEN secret — skipping deploy."
            exit 0
          fi
          curl -L https://fly.io/install.sh | sh
          "$HOME/.fly/bin/flyctl" deploy --remote-only
