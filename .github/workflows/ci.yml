name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: lint · test · eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # [reports] so the PDF export test runs; the deterministic template path
      # means no LLM/AWS keys are needed for tests or eval.
      - run: pip install -e ".[dev,reports]"
      - run: make lint
      - run: make test
      - run: make eval

  web:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
