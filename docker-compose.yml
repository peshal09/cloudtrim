# CloudTrim local stack. Setting the DB + Redis env turns on the async path
# (API enqueues -> worker processes -> Postgres); the worker consumes the queue.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CLOUDTRIM_ENVIRONMENT: development
      CLOUDTRIM_DATABASE_URL: postgresql+psycopg://cloudtrim:cloudtrim@postgres:5432/cloudtrim
      CLOUDTRIM_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      CLOUDTRIM_DATABASE_URL: postgresql+psycopg://cloudtrim:cloudtrim@postgres:5432/cloudtrim
      CLOUDTRIM_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudtrim
      POSTGRES_PASSWORD: cloudtrim
      POSTGRES_DB: cloudtrim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudtrim"]
      interval: 3s
      timeout: 3s
      retries: 10

# Seed the demo analysis into the DB:
#   docker compose run --rm api python scripts/seed_demo.py

volumes:
  pgdata:
