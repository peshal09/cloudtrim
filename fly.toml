# Fly.io config for the CloudTrim API (BLUEPRINT.md §3 Week 5).
# Deploy:  fly deploy
# The worker (apps/worker/Dockerfile), Postgres (fly postgres), and Redis (Upstash)
# are provisioned separately — see docs/operations.md. Set secrets with `fly secrets
# set CLOUDTRIM_DATABASE_URL=... CLOUDTRIM_REDIS_URL=... CLOUDTRIM_API_KEYS=...`.
app = "cloudtrim-api"
primary_region = "sjc"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  CLOUDTRIM_ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/api/v1/healthz"
  interval = "15s"
  timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
